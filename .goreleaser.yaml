version: 2

project_name: caddy-mcp

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: caddy-mcp
    main: ./cmd/caddy-mcp
    binary: caddy-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: caddy-mcp
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README*
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: venkatkrishnas
    name: caddy-mcp
  draft: false
  prerelease: auto
